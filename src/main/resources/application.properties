spring.application.name=demo
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:ccbid}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
spring.h2.console.path=/h2

app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET:change-this-jwt-secret-to-a-long-random-value-1234567890}
app.security.jwt-expiration-seconds=${APP_SECURITY_JWT_EXPIRATION_SECONDS:86400}
app.seed.legacy-auctions.enabled=${APP_SEED_LEGACY_AUCTIONS_ENABLED:true}
